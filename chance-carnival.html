<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 Chance Carnival</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',system-ui,sans-serif;background:#FFF8F0;
  padding:1rem;padding-bottom:3rem;min-height:100vh;
}
.game{max-width:680px;margin:0 auto}

header{
  background:linear-gradient(180deg,#d6336c,#a01650);color:#fff;text-align:center;
  padding:16px 18px;border-radius:18px;margin-bottom:1rem;position:relative;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
}
header h1{font-size:22px;font-weight:900;letter-spacing:0.5px}
header p{font-size:13px;opacity:0.9;margin-top:4px}
.sound-btn{
  position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.2);
  border:2px solid #fff;color:#fff;width:32px;height:32px;border-radius:50%;
  cursor:pointer;font-size:14px;
}

.stats{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.stat{
  flex:1;min-width:90px;background:#fff;border:2px solid #d6336c;
  border-radius:14px;padding:8px 10px;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
.stat-label{display:block;font-size:10px;color:#888;font-weight:700;letter-spacing:0.5px}
.stat-value{font-size:18px;color:#a01650;font-weight:800;display:block;margin-top:2px}

.question-banner{
  background:linear-gradient(180deg,#fff8dc,#fff);
  border:3px dashed #ffc94c;border-radius:14px;
  padding:14px 16px;text-align:center;font-size:17px;font-weight:700;
  color:#444;margin-bottom:1rem;line-height:1.4;
}
.question-banner .accent{color:#a01650;font-weight:800}

.visual-area{
  background:#fff;border:3px solid #d6336c;border-radius:18px;
  padding:1rem;margin-bottom:1rem;
  display:flex;align-items:center;justify-content:center;gap:1rem;
  box-shadow:0 4px 14px rgba(214,51,108,0.1);
  flex-wrap:wrap;
}
.jar-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:140px}
.jar-label{font-size:13px;font-weight:800;color:#555}
.jar-svg, .spinner-svg, .dice-svg{display:block;max-width:100%;height:auto}

.option-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem;
}
.option-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.option-grid.cols-4{grid-template-columns:repeat(2,1fr)}
@media (min-width:480px){
  .option-grid.cols-4{grid-template-columns:repeat(4,1fr)}
}

.opt-btn{
  background:#fff;border:3px solid #d6336c;border-radius:14px;
  padding:14px 8px;font-size:16px;font-weight:800;cursor:pointer;
  color:#a01650;font-family:inherit;transition:all 0.15s;
  box-shadow:0 4px 0 #d6336c;text-align:center;
}
.opt-btn:hover{background:#fff0f6;transform:translateY(-2px)}
.opt-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #d6336c}
.opt-btn.color-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px}
.opt-btn .swatch{width:36px;height:36px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px rgba(0,0,0,0.15)}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.compare-pick{
  background:#fff;border:3px solid #d6336c;border-radius:14px;
  padding:12px 6px;cursor:pointer;text-align:center;
  font-weight:800;color:#a01650;font-size:14px;
  box-shadow:0 4px 0 #d6336c;
}
.compare-pick:hover{background:#fff0f6;transform:translateY(-2px)}
.compare-pick:active{transform:translateY(3px);box-shadow:0 1px 0 #d6336c}

.add-controls{
  display:flex;gap:10px;margin-bottom:0.8rem;
  background:#fff;border:2px solid #d6336c;border-radius:12px;padding:10px;
  align-items:center;justify-content:space-around;flex-wrap:wrap;
}
.add-counter{
  display:flex;align-items:center;gap:8px;font-weight:800;color:#444;
}
.add-counter .swatch{width:26px;height:26px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px rgba(0,0,0,0.15)}
.add-counter .count{font-size:22px;color:#a01650;min-width:30px;text-align:center}
.add-btn{
  background:#fff;border:3px solid;border-radius:10px;padding:8px 14px;
  font-weight:800;cursor:pointer;font-size:14px;font-family:inherit;
  display:flex;align-items:center;gap:6px;
}
.add-btn .swatch{width:18px;height:18px;border-radius:50%}
.add-btn:active{transform:scale(0.95)}

.spin-btn-row, .submit-row{
  display:flex;gap:8px;justify-content:center;margin-bottom:1rem;
}
.big-btn{
  background:linear-gradient(180deg,#ffc94c,#e89e0b);color:#3a2400;
  border:3px solid #fff;border-radius:14px;
  padding:14px 28px;font-weight:800;cursor:pointer;font-size:18px;
  font-family:inherit;box-shadow:0 5px 0 #c47900;
}
.big-btn:hover{transform:translateY(-2px)}
.big-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #c47900}
.big-btn.disabled{opacity:0.4;cursor:not-allowed}
.big-btn.green{background:linear-gradient(180deg,#2ecc71,#27ae60);color:#fff;box-shadow:0 5px 0 #1f9b51}
.big-btn.green:active{box-shadow:0 2px 0 #1f9b51}

.spin-result{
  text-align:center;font-size:18px;font-weight:800;color:#444;margin-bottom:1rem;
  background:#fff8dc;border:2px solid #ffc94c;border-radius:12px;padding:10px;
}

.start-screen,.end-screen{
  background:#fff;border:3px solid #d6336c;border-radius:20px;
  padding:2rem 1.5rem;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.big-tent{font-size:80px;display:inline-block;animation:wave 2s ease-in-out infinite}
@keyframes wave{0%,100%{transform:rotate(-5deg) translateY(0)}50%{transform:rotate(5deg) translateY(-5px)}}

.btn{
  display:block;width:100%;max-width:300px;margin:1rem auto;padding:14px;
  font-size:17px;background:linear-gradient(180deg,#d6336c,#a01650);
  color:#fff;border:3px solid #fff;border-radius:12px;cursor:pointer;
  font-weight:800;font-family:inherit;box-shadow:0 5px 0 #a01650;
}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 #a01650}

.feedback-banner{
  position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);
  padding:1.2rem 2rem;border:4px solid #fff;border-radius:20px;
  font-size:22px;font-weight:800;z-index:99;text-align:center;
  pointer-events:none;animation:fb 2s forwards;color:#fff;max-width:90%;
}
.feedback-banner.good{
  background:linear-gradient(180deg,#00b894,#00997a);
  box-shadow:0 0 50px rgba(0,184,148,0.6);
}
.feedback-banner.bad{
  background:linear-gradient(180deg,#e17055,#c0392b);
  box-shadow:0 0 50px rgba(225,112,85,0.5);
}
.feedback-banner.hint{
  background:linear-gradient(180deg,#fdcb6e,#e67e22);
  box-shadow:0 0 50px rgba(253,203,110,0.6);
}
@keyframes fb{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.4) rotate(-8deg)}
  15%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(3deg)}
  30%{transform:translate(-50%,-50%) scale(1)}
  75%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}
}

.confetti{
  position:fixed;pointer-events:none;font-size:24px;
  animation:fall 2.5s linear;z-index:1000;top:-30px;
}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* spinner group rotation */
.spinner-rotor{
  transform-box:fill-box;
  transform-origin:center;
  transition:transform 2.5s cubic-bezier(0.17,0.67,0.83,0.97);
}
</style>
</head>
<body>
<div class="game" id="game"></div>
<script>
// === SOUND ===
let audioCtx, soundOn=true;
function beep(f,d,t='square',v=0.06){
  if(!soundOn||!audioCtx) return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=t; o.frequency.value=f;
  g.gain.setValueAtTime(v,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+d);
}
function tapSnd(){beep(880,0.04,'sine',0.04)}
function correctSnd(){[523,659,784,1047].forEach((n,i)=>setTimeout(()=>beep(n,0.12),i*70))}
function wrongSnd(){beep(220,0.25,'sawtooth',0.07)}
function spinSnd(){
  // Whirring sound: descending tones
  for(let i=0;i<10;i++) setTimeout(()=>beep(600-i*40,0.06,'sine',0.04),i*220);
}
function dingSnd(){beep(1568,0.15,'sine',0.06); setTimeout(()=>beep(2093,0.2,'sine',0.06),100)}
function winSnd(){[523,659,784,1047,1319,1568,2093].forEach((n,i)=>setTimeout(()=>beep(n,0.22,'square',0.1),i*120))}
function toggleSound(btn){soundOn=!soundOn; btn.textContent=soundOn?'🔊':'🔇'}

// === CONSTANTS ===
const TOTAL_ROUNDS=7;
const COLORS={
  red:    {hex:'#e74c3c', emoji:'🔴', name:'RED'},
  blue:   {hex:'#3498db', emoji:'🔵', name:'BLUE'},
  green:  {hex:'#2ecc71', emoji:'🟢', name:'GREEN'},
  yellow: {hex:'#f1c40f', emoji:'🟡', name:'YELLOW'},
  purple: {hex:'#9b59b6', emoji:'🟣', name:'PURPLE'},
  orange: {hex:'#e67e22', emoji:'🟠', name:'ORANGE'}
};
const COLOR_KEYS=Object.keys(COLORS);
const ROUND_TYPES=['likelihood','compare','predict','count','add'];

// === UTILS ===
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){
  const r=[...a];
  for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}
  return r;
}
function pickTwoColors(){
  const sh=shuffle(COLOR_KEYS);
  return [sh[0], sh[1]];
}
function pickThreeColors(){
  const sh=shuffle(COLOR_KEYS);
  return [sh[0], sh[1], sh[2]];
}

// === STATE ===
let state={phase:'start'};

function newGame(){
  if(!audioCtx) try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}
  state={
    phase:'playing', roundNum:1, tickets:0, combo:0, maxCombo:0,
    perfectRounds:0, mistakes:0, answered:false,
    typeQueue:shuffle([...ROUND_TYPES]),
    round:null, spinAngle:0, spinning:false, spinResult:null,
    addState:null  // for 'add' round: {target:'blue', other:'red', counts:{...}, addedTotal:0}
  };
  startRound();
  render();
}

function startRound(){
  if(state.typeQueue.length===0) state.typeQueue=shuffle([...ROUND_TYPES]);
  const type=state.typeQueue.shift();
  state.round=generateRound(type);
  state.mistakes=0;
  state.answered=false;
  state.spinAngle=0;
  state.spinning=false;
  state.spinResult=null;
  state.addState=null;
  
  // Initialize add state if this is an 'add' round
  if(type==='add'){
    const [target, other]=pickTwoColors();
    // Start with other having MORE than target, so kid must add to flip it
    const otherCount=randInt(4,6);
    const targetCount=randInt(1, otherCount-1);
    state.addState={
      target, other,
      counts:{[target]:targetCount, [other]:otherCount},
      adds:0
    };
    // Now that we know the colors, build the real question
    state.round.question=`Add marbles to make ${COLORS[target].emoji} <span class="accent">${COLORS[target].name}</span> <strong>more likely</strong> than ${COLORS[other].emoji} <span class="accent">${COLORS[other].name}</span>!`;
  }
}

function generateRound(type){
  if(type==='likelihood') return genLikelihood();
  if(type==='compare') return genCompare();
  if(type==='predict') return genPredict();
  if(type==='count') return genCount();
  if(type==='add') return genAdd();
}

function genLikelihood(){
  const types=['certain','likely','unlikely','impossible'];
  const ans=pick(types);
  const [target, other]=pickTwoColors();
  let tCount, oCount;
  if(ans==='certain'){tCount=randInt(7,10); oCount=0}
  else if(ans==='impossible'){tCount=0; oCount=randInt(7,10)}
  else if(ans==='likely'){tCount=randInt(7,9); oCount=randInt(1,3)}
  else {tCount=randInt(1,3); oCount=randInt(7,9)}
  const marbles=[];
  for(let i=0;i<tCount;i++) marbles.push(target);
  for(let i=0;i<oCount;i++) marbles.push(other);
  return {
    type:'likelihood',
    marbles:shuffle(marbles),
    target, other, answer:ans,
    question:`Picking a ${COLORS[target].emoji} <span class="accent">${COLORS[target].name}</span> marble without looking is...`
  };
}

function genCompare(){
  const target=pick(COLOR_KEYS);
  let other;
  do{other=pick(COLOR_KEYS)} while(other===target);
  // Jar A: target majority. Jar B: target minority. (Or both have target, but different proportions.)
  // To make it clear, use different proportions.
  const aTotal=10, bTotal=10;
  const aTarget=randInt(6,9);   // Jar A has lots of target
  const bTarget=randInt(1,4);   // Jar B has few target
  // Make sure aTarget != bTarget to keep clarity
  const buildJar=(tc, total, t, o) => {
    const m=[];
    for(let i=0;i<tc;i++) m.push(t);
    for(let i=0;i<total-tc;i++) m.push(o);
    return shuffle(m);
  };
  // Randomize which jar wins
  let winnerSide;
  let jarA, jarB;
  if(Math.random()<0.5){
    jarA=buildJar(aTarget, aTotal, target, other);
    jarB=buildJar(bTarget, bTotal, target, other);
    winnerSide='A';
  } else {
    jarA=buildJar(bTarget, aTotal, target, other);
    jarB=buildJar(aTarget, bTotal, target, other);
    winnerSide='B';
  }
  return {
    type:'compare',
    target, other, jarA, jarB, answer:winnerSide,
    question:`Which jar is <span class="accent">MORE LIKELY</span> to give you a ${COLORS[target].emoji} <span class="accent">${COLORS[target].name}</span> marble?`
  };
}

function genPredict(){
  // Build a spinner with 3-4 colors, one clearly dominant
  const colors=pickThreeColors();
  // Dominant has 45-55% of pie
  const dom=randInt(45,55);
  const rem=100-dom;
  // Distribute remaining between other 2-3 colors
  const c2=randInt(15, rem-15);
  const c3=rem-c2;
  // Build sections list: dominant first (visually largest), then others
  const weights=[dom, c2, c3];
  const sections=[];
  let start=0;
  // Shuffle order so dominant isn't always at top
  const order=shuffle([0,1,2]);
  for(const idx of order){
    const sweep=weights[idx] * 3.6;
    sections.push({
      color:colors[idx], weight:weights[idx],
      startAngle:start, sweep
    });
    start+=sweep;
  }
  const dominantColor=colors[0];
  return {
    type:'predict',
    sections, dominantColor,
    colors,
    question:`What will the spinner <span class="accent">MOST LIKELY</span> land on?`
  };
}

function genCount(){
  const [target, other]=pickTwoColors();
  const total=randInt(8,12);
  const tCount=randInt(2, total-2);
  const oCount=total-tCount;
  const marbles=[];
  for(let i=0;i<tCount;i++) marbles.push(target);
  for(let i=0;i<oCount;i++) marbles.push(other);
  // Ask either "how many target?" or "how many other?"
  const askTarget=Math.random()<0.5;
  const askedColor=askTarget?target:other;
  const knownColor=askTarget?other:target;
  const knownCount=askTarget?oCount:tCount;
  const askedCount=askTarget?tCount:oCount;
  // Build distractor choices
  const choices=new Set([askedCount]);
  while(choices.size<4){
    const off=randInt(-3,3);
    if(off===0) continue;
    const v=askedCount+off;
    if(v<0 || v>total) continue;
    choices.add(v);
  }
  return {
    type:'count',
    marbles:shuffle(marbles), total,
    askedColor, knownColor, knownCount, askedCount,
    choices:shuffle([...choices]),
    answer:askedCount,
    question:`There are <span class="accent">${total} marbles total</span>. ${knownCount} are ${COLORS[knownColor].emoji} ${COLORS[knownColor].name}. How many are ${COLORS[askedColor].emoji} <span class="accent">${COLORS[askedColor].name}</span>?`
  };
}

function genAdd(){
  // Generated in startRound — return shell here
  return {
    type:'add',
    question:`Add marbles so <span class="accent">target</span> is MORE LIKELY than <span class="accent">other</span>!`
  };
}

// === SVG RENDERERS ===
function renderJarSvg(marbles, opts={}){
  const scale=opts.scale||1;
  const w=200*scale, h=260*scale;
  // marble positions: 5 cols per row, fill from bottom
  const cols=5;
  const rows=Math.ceil(marbles.length/cols);
  const marbleR=12*scale;
  const colSpace=26*scale;
  const rowSpace=26*scale;
  const baseY=(225-marbleR)*scale;
  // jar
  let svg=`<svg class="jar-svg" viewBox="0 0 ${200*scale} ${260*scale}" width="${w}" height="${h}">
    <defs>
      <linearGradient id="jarGlass${opts.id||''}" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="rgba(174,210,238,0.4)"/>
        <stop offset="20%" stop-color="rgba(255,255,255,0.7)"/>
        <stop offset="100%" stop-color="rgba(174,210,238,0.4)"/>
      </linearGradient>
    </defs>
    <rect x="${30*scale}" y="${15*scale}" width="${140*scale}" height="${22*scale}" rx="${4*scale}" fill="#8b5a14" stroke="#5b3a06" stroke-width="${2*scale}"/>
    <path d="M ${30*scale} ${40*scale} L ${30*scale} ${230*scale} Q ${30*scale} ${245*scale} ${45*scale} ${245*scale} L ${155*scale} ${245*scale} Q ${170*scale} ${245*scale} ${170*scale} ${230*scale} L ${170*scale} ${40*scale} Z"
      fill="url(#jarGlass${opts.id||''})" stroke="#666" stroke-width="${2*scale}"/>`;
  // marbles
  marbles.forEach((c,i)=>{
    const row=Math.floor(i/cols);
    const idxInRow=i%cols;
    // Center the partial top row
    const itemsInThisRow=(row===rows-1) ? (marbles.length - row*cols) : cols;
    const rowOffsetX=(cols-itemsInThisRow)*colSpace/2;
    const x=(45*scale)+idxInRow*colSpace+rowOffsetX;
    const y=baseY-row*rowSpace;
    svg+=`<circle cx="${x}" cy="${y}" r="${marbleR}" fill="${COLORS[c].hex}" stroke="rgba(0,0,0,0.3)" stroke-width="${1.5*scale}"/>
    <ellipse cx="${x-marbleR*0.35}" cy="${y-marbleR*0.4}" rx="${marbleR*0.35}" ry="${marbleR*0.22}" fill="rgba(255,255,255,0.6)"/>`;
  });
  svg+='</svg>';
  return svg;
}

function renderSpinnerSvg(sections, opts={}){
  const angle=opts.angle||0;
  // Build pie slices
  let svg=`<svg class="spinner-svg" viewBox="0 0 200 220" width="240" height="264">
    <g class="spinner-rotor" style="transform:rotate(${angle}deg)" id="${opts.id||'spinner-rotor'}">`;
  for(const s of sections){
    svg+=`<path d="${arcPath(100,100,80,s.startAngle,s.startAngle+s.sweep)}" fill="${COLORS[s.color].hex}" stroke="#fff" stroke-width="2"/>`;
  }
  // outer ring
  svg+=`<circle cx="100" cy="100" r="80" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="100" cy="100" r="10" fill="#333"/>
    </g>
    <polygon points="100,8 88,32 112,32" fill="#d6336c" stroke="#fff" stroke-width="2"/>
    <circle cx="100" cy="100" r="6" fill="#ffc94c" stroke="#333" stroke-width="2"/>
  </svg>`;
  return svg;
}

function arcPath(cx,cy,r,startA,endA){
  const sR=(startA-90)*Math.PI/180;
  const eR=(endA-90)*Math.PI/180;
  const x1=cx+r*Math.cos(sR), y1=cy+r*Math.sin(sR);
  const x2=cx+r*Math.cos(eR), y2=cy+r*Math.sin(eR);
  const large=(endA-startA)>180?1:0;
  return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
}

function getSpinResult(angle, sections){
  // Pointer is at top (angle 0). After rotating spinner by `angle`, the section
  // that ends up at top was originally at angle (360 - angle % 360).
  const norm=((angle%360)+360)%360;
  const pointerAt=(360-norm)%360;
  for(const s of sections){
    if(pointerAt>=s.startAngle && pointerAt<s.startAngle+s.sweep) return s.color;
  }
  return sections[0].color;
}

// === RENDER ===
function render(){
  const g=document.getElementById('game');
  if(state.phase==='start') g.innerHTML=renderStart();
  else if(state.phase==='gameEnd') g.innerHTML=renderEnd();
  else g.innerHTML=renderPlay();
}

function renderHeader(){
  return `<header>
    <h1>🎪 Chance Carnival 🎟️</h1>
    <p>Test your luck and probability skills!</p>
    <button class="sound-btn" onclick="toggleSound(this)">${soundOn?'🔊':'🔇'}</button>
  </header>`;
}

function renderStart(){
  return `${renderHeader()}
  <div class="start-screen">
    <div class="big-tent">🎪</div>
    <h2 style="font-size:26px;color:#a01650;margin:0.5rem 0">Welcome to the Carnival!</h2>
    <p style="font-size:15px;color:#555;line-height:1.7;margin:1rem auto;text-align:left;max-width:380px">
      Visit ${TOTAL_ROUNDS} booths, each with a different probability puzzle:<br><br>
      🫙 <strong>How Likely?</strong> — certain, likely, unlikely, or impossible?<br>
      ⚖️ <strong>Compare Jars</strong> — which is more likely?<br>
      🎡 <strong>Spinner Predict</strong> — pick first, then spin!<br>
      🔢 <strong>Count Marbles</strong> — how many of each color?<br>
      ➕ <strong>Make It Likely</strong> — add marbles to flip the odds<br><br>
      🎟️ Earn <strong>tickets</strong> for correct answers<br>
      🔥 Build <strong>combos</strong> for bonus tickets<br>
      🏆 Get the medal at the end of the carnival
    </p>
    <button class="btn" onclick="newGame()">🎟️ Enter the Carnival!</button>
  </div>`;
}

function renderPlay(){
  return `${renderHeader()}
  <div id="stats-area">${statsHtml()}</div>
  <div class="question-banner">${state.round.question}</div>
  ${renderVisual()}
  ${renderInput()}`;
}

function renderVisual(){
  const r=state.round;
  if(r.type==='likelihood') return `<div class="visual-area">${renderJarSvg(r.marbles)}</div>`;
  if(r.type==='compare') return `<div class="visual-area">
    <div class="jar-wrap"><div class="jar-label">JAR A</div>${renderJarSvg(r.jarA,{scale:0.85,id:'a'})}</div>
    <div class="jar-wrap"><div class="jar-label">JAR B</div>${renderJarSvg(r.jarB,{scale:0.85,id:'b'})}</div>
  </div>`;
  if(r.type==='predict') return `<div class="visual-area">${renderSpinnerSvg(r.sections,{angle:state.spinAngle})}</div>
    ${state.spinResult ? `<div class="spin-result">🎯 It landed on ${COLORS[state.spinResult].emoji} <strong>${COLORS[state.spinResult].name}</strong>!</div>` : ''}`;
  if(r.type==='count') return `<div class="visual-area">${renderJarSvg(r.marbles)}</div>`;
  if(r.type==='add'){
    const s=state.addState;
    const marbles=[];
    for(let i=0;i<s.counts[s.target];i++) marbles.push(s.target);
    for(let i=0;i<s.counts[s.other];i++) marbles.push(s.other);
    return `<div class="visual-area">${renderJarSvg(shuffle(marbles))}</div>`;
  }
  return '';
}

function renderInput(){
  const r=state.round;
  if(r.type==='likelihood'){
    return `<div class="option-grid cols-4">
      ${['certain','likely','unlikely','impossible'].map(opt =>
        `<button class="opt-btn" onclick="answerLikelihood('${opt}')">${opt.toUpperCase()}</button>`
      ).join('')}
    </div>`;
  }
  if(r.type==='compare'){
    return `<div class="compare-grid">
      <button class="compare-pick" onclick="answerCompare('A')">⬅️ Jar A</button>
      <button class="compare-pick" onclick="answerCompare('B')">Jar B ➡️</button>
    </div>`;
  }
  if(r.type==='predict'){
    if(!state.predicted){
      return `<div class="option-grid cols-3">
        ${r.colors.map(c => `<button class="opt-btn color-btn" onclick="answerPredict('${c}')">
          <div class="swatch" style="background:${COLORS[c].hex}"></div>
          <div>${COLORS[c].name}</div>
        </button>`).join('')}
      </div>`;
    }
    if(state.spinning){
      return `<div class="spin-btn-row"><button class="big-btn disabled">🎡 Spinning...</button></div>`;
    }
    if(state.spinResult){
      return ``;  // Spinner result shown above; will auto-advance
    }
    return `<div class="spin-btn-row">
      <button class="big-btn" onclick="doSpin()">🎡 SPIN THE WHEEL!</button>
    </div>`;
  }
  if(r.type==='count'){
    return `<div class="option-grid cols-4">
      ${r.choices.map(c => `<button class="opt-btn" onclick="answerCount(${c})">${c}</button>`).join('')}
    </div>`;
  }
  if(r.type==='add'){
    const s=state.addState;
    const tc=COLORS[s.target], oc=COLORS[s.other];
    return `<div class="add-controls">
      <div class="add-counter">
        <div class="swatch" style="background:${tc.hex}"></div>
        ${tc.name}: <span class="count">${s.counts[s.target]}</span>
      </div>
      <div class="add-counter">
        <div class="swatch" style="background:${oc.hex}"></div>
        ${oc.name}: <span class="count">${s.counts[s.other]}</span>
      </div>
    </div>
    <div class="submit-row" style="flex-wrap:wrap">
      <button class="add-btn" style="border-color:${tc.hex};color:${tc.hex}" onclick="addMarble('${s.target}')">
        <div class="swatch" style="background:${tc.hex}"></div>+ ${tc.name}
      </button>
      <button class="add-btn" style="border-color:${oc.hex};color:${oc.hex}" onclick="addMarble('${s.other}')">
        <div class="swatch" style="background:${oc.hex}"></div>+ ${oc.name}
      </button>
    </div>
    <div class="submit-row">
      <button class="big-btn green" onclick="submitAdd()">✓ Done!</button>
    </div>`;
  }
  return '';
}

// === ANSWER HANDLERS ===
function answerLikelihood(opt){
  if(state.answered) return;
  state.answered=true;
  const correct=opt===state.round.answer;
  handleResult(correct, correct ? null : `It was actually <strong>${state.round.answer.toUpperCase()}</strong>`);
}

function answerCompare(side){
  if(state.answered) return;
  state.answered=true;
  const correct=side===state.round.answer;
  handleResult(correct, correct ? null : `Jar ${state.round.answer} had more!`);
}

function answerPredict(color){
  if(state.answered) return;
  state.predicted=color;
  // Re-render to show spin button
  render();
}

function doSpin(){
  if(state.spinning) return;
  state.spinning=true;
  // Compute target rotation
  const turns=4+Math.random()*3;
  const offset=Math.random()*360;
  const newAngle=(state.spinAngle||0)+turns*360+offset;
  spinSnd();
  // Render first while state.spinAngle is STILL the old value, so the spinner
  // SVG mounts at its current position and the button switches to "Spinning..."
  render();
  // Then on the next frame, update the rotor's transform directly on the DOM.
  // The CSS transition fires because the element already exists at the old angle.
  requestAnimationFrame(()=>{
    state.spinAngle=newAngle;
    const rotor=document.getElementById('spinner-rotor');
    if(rotor){
      rotor.style.transition='transform 2.5s cubic-bezier(0.17, 0.67, 0.83, 0.97)';
      rotor.style.transform=`rotate(${newAngle}deg)`;
    }
  });
  setTimeout(()=>{
    state.spinning=false;
    state.spinResult=getSpinResult(state.spinAngle, state.round.sections);
    dingSnd();
    // Now check if prediction was correct (most-likely color)
    const correct=state.predicted===state.round.dominantColor;
    state.answered=true;
    const matched=state.spinResult===state.predicted;
    let msg;
    if(correct){
      msg=matched
        ? `${COLORS[state.predicted].name} WAS most likely — and you got lucky too! 🍀`
        : `${COLORS[state.predicted].name} was the most likely answer! Probability doesn't guarantee.`;
    } else {
      msg=`${COLORS[state.round.dominantColor].name} was actually the most likely.`;
    }
    handleResult(correct, msg);
  }, 2700);
}

function answerCount(n){
  if(state.answered) return;
  state.answered=true;
  const correct=n===state.round.answer;
  handleResult(correct, correct ? null : `The answer was <strong>${state.round.answer}</strong>`);
}

function addMarble(color){
  if(state.answered) return;
  const s=state.addState;
  if(s.counts[s.target] + s.counts[s.other] >= 15) return; // cap
  s.counts[color]++;
  s.adds++;
  tapSnd();
  render();
}

function submitAdd(){
  if(state.answered) return;
  state.answered=true;
  const s=state.addState;
  const tc=s.counts[s.target];
  const oc=s.counts[s.other];
  const correct=tc>oc;
  const msg=correct 
    ? `${tc} ${COLORS[s.target].name} vs ${oc} ${COLORS[s.other].name} — ${COLORS[s.target].name} is more likely!`
    : `You need MORE ${COLORS[s.target].name} than ${COLORS[s.other].name}. Got ${tc} vs ${oc}.`;
  handleResult(correct, msg);
}

function handleResult(correct, message){
  if(correct){
    state.combo++;
    state.maxCombo=Math.max(state.maxCombo,state.combo);
    let pts=10+(state.combo-1)*2;
    state.tickets+=pts;
    if(state.mistakes===0) state.perfectRounds++;
    correctSnd();
    showFeedback(`✨ ${message || 'Correct!'} +${pts} 🎟️`, 'good');
    setTimeout(advance, state.round.type==='predict' ? 2500 : 1900);
  } else {
    state.combo=0;
    state.mistakes++;
    state.tickets=Math.max(0,state.tickets-3);
    wrongSnd();
    showFeedback(`Not quite. ${message || ''} −3 🎟️`,'bad');
    // For likelihood/compare/count, allow retry on same round
    // For predict/add, auto-advance (the spin/add is single-shot)
    const t=state.round.type;
    if(t==='predict' || t==='add'){
      setTimeout(advance, 2500);
    } else {
      setTimeout(()=>{state.answered=false; render()}, 2200);
    }
  }
  renderStats();
}

function advance(){
  if(state.roundNum>=TOTAL_ROUNDS){
    state.phase='gameEnd';
    winSnd();
    confetti();
    setTimeout(confetti, 800);
    render();
    return;
  }
  state.roundNum++;
  state.predicted=null;
  startRound();
  render();
}

function renderEnd(){
  let medal='🥉', msg='Nice carnival!';
  if(state.perfectRounds===TOTAL_ROUNDS){medal='🏆'; msg='PERFECT! Carnival Champion!'}
  else if(state.perfectRounds>=TOTAL_ROUNDS-2){medal='🥇'; msg='Excellent fortune!'}
  else if(state.perfectRounds>=3){medal='🥈'; msg='Good chance-finding!'}
  return `${renderHeader()}
  <div class="end-screen">
    <div style="font-size:90px">${medal}</div>
    <h2 style="font-size:26px;color:#a01650;margin:0.5rem 0">${msg}</h2>
    <div style="background:#fff8dc;border:2px solid #ffc94c;border-radius:12px;padding:1rem;margin:1rem 0;font-size:16px;line-height:1.8">
      🎟️ Tickets won: <strong>${state.tickets}</strong><br>
      ⭐ Perfect booths: <strong>${state.perfectRounds}/${TOTAL_ROUNDS}</strong><br>
      🔥 Best combo: <strong>×${state.maxCombo}</strong>
    </div>
    <button class="btn" onclick="newGame()">🎪 Visit Again!</button>
  </div>`;
}

function statsHtml(){
  return `<div id="stats-area"><div class="stats">
    <div class="stat">
      <span class="stat-label">🎪 BOOTH</span>
      <span class="stat-value">${state.roundNum}/${TOTAL_ROUNDS}</span>
    </div>
    <div class="stat">
      <span class="stat-label">🎟️ TICKETS</span>
      <span class="stat-value">${state.tickets}</span>
    </div>
    <div class="stat">
      <span class="stat-label">🔥 COMBO</span>
      <span class="stat-value">×${state.combo}</span>
    </div>
  </div></div>`;
}

function renderStats(){
  const el=document.getElementById('stats-area');
  if(el) el.outerHTML=statsHtml();
}

function showFeedback(text, kind){
  const el=document.createElement('div');
  el.className='feedback-banner '+kind;
  el.innerHTML=text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}

function confetti(){
  const emojis=['🎉','🎟️','🎪','🎡','✨','🍀','🎭','🎲'];
  for(let i=0;i<30;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.textContent=pick(emojis);
    c.style.left=Math.random()*100+'vw';
    c.style.animationDelay=Math.random()*0.8+'s';
    c.style.animationDuration=(1.8+Math.random()*1.5)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

render();
</script>
</body>
</html>
